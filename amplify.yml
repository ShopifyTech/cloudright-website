version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - echo "GMAIL_USER=$GMAIL_USER" >> .env
        - echo "GMAIL_APP_PASSWORD=$GMAIL_APP_PASSWORD" >> .env
        - echo "CONTACT_RECEIVER_EMAIL=$CONTACT_RECEIVER_EMAIL" >> .env
        - npm run build
        - npm run build

  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*
